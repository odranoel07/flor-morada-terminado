<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="icon" href="img/flowers.png" type="image/x-icon"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
  <title>Flower</title>
  <style>
    #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    #leo-bg{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.25;transition:opacity 3s ease;}

    /* ══ LETRAS/MENSAJE ══ */
    #lyrics{
      position:fixed;top:3vh;left:50%;transform:translateX(-50%);
      z-index:120;text-align:center;
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:clamp(0.9rem,3.5vw,1.35rem);
      color:#f0e4ff;
      text-shadow:0 0 18px #cc88ffbb,0 0 40px #8844ff55,0 2px 10px #000c;
      letter-spacing:0.04em;max-width:88vw;line-height:1.65;
      opacity:0;transition:opacity 0.7s ease;pointer-events:none;
      padding:0 1rem;
    }
    #lyrics.bold-msg{
      font-style:normal;font-size:clamp(1.1rem,6vw,2.6rem);font-weight:600;
      letter-spacing:0.1em;color:#ffe566;max-width:90vw;line-height:1.35;
      text-shadow:0 0 20px #ffb800ee,0 0 50px #ff880099,0 3px 12px #0009;
    }

    /* ══ TÍTULO — móvil: más pequeño y debajo del centro ══ */
    .titulo{
      position:fixed!important;top:50%!important;left:50%!important;
      transform:translate(-50%,-50%)!important;z-index:40;
      text-align:center;font-family:'Cormorant Garamond',serif;
      font-size:clamp(0.78rem,2.8vw,1.15rem);font-style:italic;
      color:#f0e8ff;line-height:1.75;
      width:min(440px,82vw);
      padding:1.1rem 1.4rem;background:rgba(4,0,22,0.78);
      border:1px solid rgba(160,100,255,0.25);border-radius:16px;
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      text-shadow:0 0 16px rgba(200,150,255,0.45),0 2px 8px #000c;
    }
    @keyframes fadeOut{from{opacity:1}to{opacity:0}}

    /* ══ CONSTELACIONES LATERALES — ocultas en móvil muy pequeño ══ */
    .side-const{position:fixed;top:50%;transform:translateY(-50%);z-index:5;pointer-events:none;opacity:0.65;}
    #const-left{left:2px;} #const-right{right:2px;}
    @media(max-width:480px){.side-const{display:none;}}

    /* ══ ESTRELLA FUGAZ ══ */
    #shooting-star{position:fixed;z-index:300;pointer-events:none;opacity:0;top:12vh;left:-20vw;display:flex;align-items:center;gap:12px;white-space:nowrap;}
    .s-trail{width:0;height:3px;background:linear-gradient(to right,transparent,#ffe566,#fff);border-radius:3px;transition:width 1.1s ease;}
    .s-msg{font-family:'Dancing Script',cursive;font-size:clamp(1rem,4.5vw,2.4rem);color:#fff;text-shadow:0 0 25px #ffe566,0 0 55px #ffb800;letter-spacing:0.02em;opacity:0;transition:opacity 0.5s ease 0.3s;}
    @keyframes shootAcross{0%{left:-20vw;opacity:0;}6%{opacity:1;}88%{opacity:1;}100%{left:120vw;opacity:0;}}
    #shooting-star.fire{animation:shootAcross 6.5s cubic-bezier(.12,0,.72,1) forwards;}
    #shooting-star.fire .s-trail{width:100px;}
    #shooting-star.fire .s-msg{opacity:1;}

    /* ══ LEO FINAL ══ */
    #leo-final{
      position:fixed;inset:0;z-index:250;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:1.2rem;padding:1.5rem 1rem 2rem;
      background:rgba(1,0,18,0);opacity:0;pointer-events:none;
      transition:opacity 2.5s ease,background 2.5s ease;
      overflow-y:auto;
    }
    #leo-final.visible{opacity:1;pointer-events:all;background:rgba(1,0,18,0.93);}
    #leo-final svg{width:min(520px,88vw);height:auto;filter:drop-shadow(0 0 12px rgba(180,220,255,0.5));flex-shrink:0;}
    .leo-star{fill:#e8f4ff;animation:leoTwink 2s ease-in-out infinite alternate;}
    .leo-star.bright{fill:#fffde0;}
    .leo-star:nth-child(2n){animation-delay:0.4s;}.leo-star:nth-child(3n){animation-delay:0.8s;}.leo-star:nth-child(5n){animation-delay:1.2s;}
    @keyframes leoTwink{from{opacity:0.5;transform:scale(1);}to{opacity:1;transform:scale(1.3);}}
    .leo-line{stroke:rgba(170,210,255,0.45);stroke-width:1.5;fill:none;stroke-dasharray:8 8;animation:leoDash 5s linear infinite;}
    @keyframes leoDash{to{stroke-dashoffset:-80;}}
    #leo-final-text{
      font-family:'Cormorant Garamond',serif;font-style:italic;
      font-size:clamp(0.88rem,3vw,1.25rem);
      color:rgba(210,235,255,0.92);text-align:center;
      max-width:min(600px,88vw);line-height:1.85;letter-spacing:0.03em;
      text-shadow:0 0 20px rgba(150,200,255,0.5);
      padding:0 0.5rem;
    }
    #leo-cursor{display:inline-block;width:2px;height:1em;background:rgba(180,220,255,0.8);vertical-align:text-bottom;margin-left:2px;animation:blink2 0.9s step-end infinite;}
    @keyframes blink2{0%,100%{opacity:1}50%{opacity:0}}

    /* Botón volver a ver — aparece al final de Leo */
    #btn-volver{
      display:block;margin:0.6rem auto 0;
      background:transparent;
      border:1.5px solid rgba(180,210,255,0.5);
      border-radius:40px;
      padding:0.65rem 2rem;
      font-family:'Dancing Script',cursive;
      font-size:clamp(1rem,3.5vw,1.3rem);
      color:rgba(200,230,255,0.9);
      cursor:pointer;
      letter-spacing:0.06em;
      opacity:0;
      pointer-events:none;
      transition:opacity 1s ease,transform 0.2s,box-shadow 0.2s,background 0.2s;
      text-shadow:0 0 14px rgba(150,200,255,0.6);
      box-shadow:0 0 18px rgba(150,200,255,0.1);
      -webkit-tap-highlight-color:transparent;
    }
    #btn-volver.show{opacity:1;pointer-events:all;}
    #btn-volver:hover,#btn-volver:active{
      background:rgba(160,210,255,0.1);
      box-shadow:0 0 35px rgba(150,200,255,0.35);
      transform:scale(1.05);
    }

    /* ══ GATITO SVG ══ */
    #cat-scene{position:fixed;inset:0;z-index:180;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;background:rgba(0,0,18,0);pointer-events:none;opacity:0;transition:background 1.8s ease,opacity 1.8s ease;}
    #cat-scene.visible{opacity:1;pointer-events:all;background:rgba(0,0,18,0.9);}
    #cat-svg{filter:drop-shadow(0 0 8px #99ccff) drop-shadow(0 0 22px #5588ffaa);}
    .c-line{stroke:rgba(160,210,255,0.5);stroke-width:1.3;fill:none;stroke-dasharray:5 5;animation:cdash 3s linear infinite;}
    @keyframes cdash{to{stroke-dashoffset:-40;}}
    .c-dot{fill:#cce8ff;animation:cdot 1.8s ease-in-out infinite alternate;}
    .c-dot.big{fill:#e8f4ff;}
    .c-dot.heart{fill:#ffaacc;}
    .c-dot:nth-child(2n){animation-delay:0.5s;}.c-dot:nth-child(3n){animation-delay:1s;}
    @keyframes cdot{from{opacity:0.4;}to{opacity:1;}}
    #cat-bubble{font-family:'Dancing Script',cursive;font-size:clamp(1rem,4vw,1.6rem);color:#ddeeff;text-align:center;text-shadow:0 0 18px #88aaff;opacity:0;animation:bubIn 1s ease 1s forwards;}
    @keyframes bubIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

    /* ══ LUNA ══ */
    #moon-scene{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,10,0);pointer-events:none;opacity:0;transition:background 2s ease,opacity 2s ease;}
    #moon-scene.visible{opacity:1;pointer-events:all;background:rgba(0,0,10,0.88);}
    /* Luna más pequeña en móvil */
    .moon-container{position:relative;width:min(280px,70vw);height:min(280px,70vw);}
    .moon-halo{position:absolute;inset:-50px;border-radius:50%;background:radial-gradient(circle,rgba(220,220,190,0.13) 0%,transparent 70%);animation:haloP 3.5s ease-in-out infinite;pointer-events:none;}
    @keyframes haloP{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.08);opacity:1}}
    .moon-half{position:absolute;top:0;width:50%;height:100%;overflow:hidden;transition:transform 1.8s cubic-bezier(.77,0,.18,1);}
    .moon-half.left{left:0;border-radius:50% 0 0 50%;transform-origin:right center;}
    .moon-half.right{left:50%;border-radius:0 50% 50% 0;transform-origin:left center;}
    .moon-half.split-left{transform:translateX(-55%) rotate(-12deg);}
    .moon-half.split-right{transform:translateX(55%) rotate(12deg);}
    .moon-half svg{position:absolute;top:0;left:0;width:200%;height:100%;}
    .moon-half.right svg{left:-100%;}

    /* ══ CARTA — scroll nativo en móvil ══ */
    #carta{
      position:fixed;top:50%;left:50%;
      transform:translate(-50%,-50%) scale(0.05);
      width:min(460px,94vw);
      max-height:88vh;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
      background:linear-gradient(155deg,#fffef8 0%,#fff9ee 55%,#fff0f5 100%);
      border:1.5px solid #ffe082;border-radius:20px;
      padding:1.6rem 1.4rem 1.4rem;
      box-shadow:0 14px 90px #e0b00066,0 4px 28px #0008;
      text-align:left;opacity:0;
      transition:transform 1.4s cubic-bezier(.34,1.56,.64,1),opacity 0.9s ease;
      z-index:210;pointer-events:none;
    }
    #carta.open{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all;}
    .carta-deco{text-align:center;font-size:1.8rem;display:block;margin-bottom:0.4rem;animation:hbeat 1.5s ease-in-out infinite;}
    @keyframes hbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.18)}28%{transform:scale(1)}42%{transform:scale(1.12)}}
    #carta h2{font-family:'Dancing Script',cursive;font-size:clamp(1.2rem,4vw,1.5rem);color:#7b1fa2;text-align:center;margin:0 0 0.8rem;}
    #carta-text{font-family:'Cormorant Garamond',serif;font-size:clamp(0.92rem,3vw,1.02rem);color:#3a1830;line-height:1.82;min-height:2em;}
    #cursor{display:inline-block;width:2px;height:1em;background:#9c27b0;vertical-align:text-bottom;margin-left:2px;animation:blink 0.8s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* Botón cerrar — con efecto de estrellitas al pulsar */
    .btn-cerrar{
      display:block;margin:1.2rem auto 0;
      background:linear-gradient(135deg,#9c27b0,#7b1fa2);
      color:#fff;border:none;border-radius:30px;
      padding:0.6rem 2rem;
      font-family:'Dancing Script',cursive;font-size:clamp(1rem,3.5vw,1.1rem);
      cursor:pointer;opacity:0;
      transition:opacity 0.6s ease,transform 0.15s,box-shadow 0.2s;
      box-shadow:0 4px 20px #9c27b055;
      -webkit-tap-highlight-color:transparent;
      /* área táctil grande para móvil */
      min-height:44px;min-width:140px;
    }
    .btn-cerrar.show{opacity:1;}
    .btn-cerrar:hover,.btn-cerrar:active{transform:scale(1.06);box-shadow:0 6px 28px #9c27b088;}

    /* ══ ESTRELLAS DECORATIVAS ══ */
    .star-burst{position:fixed;pointer-events:none;z-index:220;font-size:clamp(1rem,3vw,1.4rem);animation:sFly 2s ease-out forwards;}
    @keyframes sFly{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0.2) rotate(var(--rot))}}
  </style>
</head>
<body class="container">

  <canvas id="bg-canvas"></canvas>

  <!-- LEO fondo -->
  <svg id="leo-bg" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <circle cx="500" cy="320" r="5"   fill="#fffde0" opacity="0.95"/>
    <circle cx="420" cy="178" r="3.2" fill="#ccdff5"/><circle cx="452" cy="248" r="3.8" fill="#ddeeff"/>
    <circle cx="388" cy="258" r="2.8" fill="#ccdff5"/><circle cx="348" cy="298" r="2.8" fill="#ccdff5"/>
    <circle cx="368" cy="360" r="2.8" fill="#ccdff5"/><circle cx="640" cy="308" r="3.8" fill="#ddeeff"/>
    <circle cx="568" cy="288" r="2.8" fill="#ccdff5"/><circle cx="540" cy="368" r="2.8" fill="#ccdff5"/>
    <circle cx="478" cy="378" r="2.8" fill="#ccdff5"/>
    <g stroke="rgba(180,210,255,0.28)" stroke-width="1.3" fill="none" stroke-dasharray="6 7">
      <line x1="420" y1="178" x2="452" y2="248"/><line x1="452" y1="248" x2="388" y2="258"/>
      <line x1="388" y1="258" x2="348" y2="298"/><line x1="348" y1="298" x2="368" y2="360"/>
      <line x1="368" y1="360" x2="500" y2="320"/><line x1="500" y1="320" x2="452" y2="248"/>
      <line x1="500" y1="320" x2="568" y2="288"/><line x1="568" y1="288" x2="640" y2="308"/>
      <line x1="500" y1="320" x2="540" y2="368"/><line x1="540" y1="368" x2="478" y2="378"/>
    </g>
    <text x="490" y="460" font-family="Georgia,serif" font-size="22" fill="rgba(200,220,255,0.22)" text-anchor="middle" font-style="italic">♌ LEO</text>
  </svg>

  <audio id="audio1" src="sound/ilived.mp3" autoplay></audio>
  <audio id="audio2" src="sound/paradise.mp3"></audio>

  <div id="lyrics"></div>

  <h1 class="titulo">
    Estas flores moradas representan admiración, esperanza y fortaleza.<br><br>
    Que te recuerden siempre la capacidad que tienes para superar obstáculos,
    alcanzar tus metas y seguir brillando con luz propia. 💜
  </h1>

  <!-- Constelaciones laterales -->
  <svg class="side-const" id="const-left" width="90" height="360" viewBox="0 0 90 360" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(160,200,255,0.42)" stroke-width="1" fill="none" stroke-dasharray="4 5">
      <line x1="22" y1="30" x2="48" y2="80"/><line x1="48" y1="80" x2="28" y2="130"/>
      <line x1="28" y1="130" x2="55" y2="175"/><line x1="55" y1="175" x2="32" y2="225"/>
      <line x1="32" y1="225" x2="58" y2="270"/><line x1="58" y1="270" x2="35" y2="320"/>
    </g>
    <circle cx="22" cy="30"  r="3.5" fill="#cce8ff" opacity="0.85"/>
    <circle cx="48" cy="80"  r="2.5" fill="#ddf0ff" opacity="0.7"/>
    <circle cx="28" cy="130" r="2"   fill="#cce8ff" opacity="0.6"/>
    <circle cx="55" cy="175" r="3"   fill="#ffe0d0" opacity="0.75"/>
    <circle cx="32" cy="225" r="2"   fill="#cce8ff" opacity="0.6"/>
    <circle cx="58" cy="270" r="2.5" fill="#ddf0ff" opacity="0.7"/>
    <circle cx="35" cy="320" r="3.5" fill="#cce8ff" opacity="0.85"/>
  </svg>
  <svg class="side-const" id="const-right" width="90" height="360" viewBox="0 0 90 360" xmlns="http://www.w3.org/2000/svg">
    <g stroke="rgba(190,170,255,0.42)" stroke-width="1" fill="none" stroke-dasharray="4 5">
      <line x1="68" y1="35" x2="42" y2="88"/><line x1="42" y1="88" x2="65" y2="140"/>
      <line x1="65" y1="140" x2="38" y2="188"/><line x1="38" y1="188" x2="62" y2="238"/>
      <line x1="62" y1="238" x2="35" y2="285"/><line x1="35" y1="285" x2="60" y2="330"/>
    </g>
    <circle cx="68" cy="35"  r="3.5" fill="#e0ccff" opacity="0.85"/>
    <circle cx="42" cy="88"  r="2.5" fill="#ddf0ff" opacity="0.7"/>
    <circle cx="65" cy="140" r="2"   fill="#e0ccff" opacity="0.6"/>
    <circle cx="38" cy="188" r="3"   fill="#ffccee" opacity="0.75"/>
    <circle cx="62" cy="238" r="2"   fill="#e0ccff" opacity="0.6"/>
    <circle cx="35" cy="285" r="2.5" fill="#ddf0ff" opacity="0.7"/>
    <circle cx="60" cy="330" r="3.5" fill="#e0ccff" opacity="0.85"/>
  </svg>

  <!-- Estrella fugaz -->
  <div id="shooting-star">
    <div class="s-trail"></div>
    <div class="s-msg">✨ ¿Nos vamos juntos por última vez? ✨</div>
  </div>

  <!-- LEO FINAL -->
  <div id="leo-final">
    <svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg">
      <g>
        <line class="leo-line" x1="200" y1="60"  x2="248" y2="140"/>
        <line class="leo-line" x1="248" y1="140" x2="188" y2="148"/>
        <line class="leo-line" x1="188" y1="148" x2="148" y2="188"/>
        <line class="leo-line" x1="148" y1="188" x2="168" y2="248"/>
        <line class="leo-line" x1="168" y1="248" x2="298" y2="208"/>
        <line class="leo-line" x1="298" y1="208" x2="248" y2="140"/>
        <line class="leo-line" x1="298" y1="208" x2="378" y2="188"/>
        <line class="leo-line" x1="378" y1="188" x2="458" y2="200"/>
        <line class="leo-line" x1="298" y1="208" x2="328" y2="248"/>
        <line class="leo-line" x1="328" y1="248" x2="288" y2="258"/>
      </g>
      <circle class="leo-star bright" cx="298" cy="208" r="7" fill="#fffde0"/>
      <circle cx="298" cy="208" r="16" fill="rgba(255,253,200,0.12)"/>
      <circle class="leo-star" cx="200" cy="60"  r="5"   fill="#d8eeff"/>
      <circle class="leo-star" cx="248" cy="140" r="5.5" fill="#ddeeff"/>
      <circle class="leo-star" cx="188" cy="148" r="4"   fill="#cce4ff"/>
      <circle class="leo-star" cx="148" cy="188" r="4"   fill="#cce4ff"/>
      <circle class="leo-star" cx="168" cy="248" r="4"   fill="#cce4ff"/>
      <circle class="leo-star" cx="458" cy="200" r="5.5" fill="#ddeeff"/>
      <circle class="leo-star" cx="378" cy="188" r="4"   fill="#cce4ff"/>
      <circle class="leo-star" cx="328" cy="248" r="4"   fill="#cce4ff"/>
      <circle class="leo-star" cx="288" cy="258" r="4"   fill="#cce4ff"/>
      <text x="350" y="310" font-family="Georgia,serif" font-size="18" fill="rgba(200,225,255,0.5)" text-anchor="middle" font-style="italic">♌ LEO</text>
    </svg>
    <div id="leo-final-text"></div><span id="leo-cursor"></span>
    <button id="btn-volver" onclick="volverAVer()">🌸 Volver a ver 🌸</button>
  </div>

  <!-- GATITO CONSTELACIÓN — 100% SVG, sin imagen -->
  <div id="cat-scene">
    <!--
      Gatito tierno dibujado como constelación SVG:
      cabeza redonda, orejitas triangulares, bigotes, colita, patitas
      todo con puntos (estrellas) y líneas punteadas animadas
    -->
    <svg id="cat-svg" viewBox="0 0 260 240" width="min(280px,55vw)" height="auto" xmlns="http://www.w3.org/2000/svg">

      <!-- ── LÍNEAS DEL CUERPO ── -->
      <!-- Orejas -->
      <line class="c-line" x1="88"  y1="52"  x2="100" y2="72"/>
      <line class="c-line" x1="172" y1="52"  x2="160" y2="72"/>
      <!-- Cabeza (arco superior) -->
      <line class="c-line" x1="100" y1="72"  x2="115" y2="68"/>
      <line class="c-line" x1="115" y1="68"  x2="130" y2="66"/>
      <line class="c-line" x1="130" y1="66"  x2="145" y2="68"/>
      <line class="c-line" x1="145" y1="68"  x2="160" y2="72"/>
      <!-- Lados de la cabeza -->
      <line class="c-line" x1="100" y1="72"  x2="92"  y2="90"/>
      <line class="c-line" x1="92"  y1="90"  x2="90"  y2="108"/>
      <line class="c-line" x1="160" y1="72"  x2="168" y2="90"/>
      <line class="c-line" x1="168" y1="90"  x2="170" y2="108"/>
      <!-- Mandíbula -->
      <line class="c-line" x1="90"  y1="108" x2="100" y2="118"/>
      <line class="c-line" x1="100" y1="118" x2="130" y2="122"/>
      <line class="c-line" x1="130" y1="122" x2="160" y2="118"/>
      <line class="c-line" x1="160" y1="118" x2="170" y2="108"/>
      <!-- Cuello y cuerpo -->
      <line class="c-line" x1="105" y1="118" x2="100" y2="135"/>
      <line class="c-line" x1="155" y1="118" x2="160" y2="135"/>
      <line class="c-line" x1="100" y1="135" x2="94"  y2="160"/>
      <line class="c-line" x1="160" y1="135" x2="166" y2="160"/>
      <line class="c-line" x1="94"  y1="160" x2="96"  y2="185"/>

  <script>
    (function(){
      var c=document.getElementById('bg-canvas'),ctx=c.getContext('2d'),W,H,stars=[];
      function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
      resize();window.addEventListener('resize',resize);
      for(var i=0;i<240;i++)stars.push({fx:Math.random(),fy:Math.random(),r:Math.random()*1.3+0.2,t:Math.random()*Math.PI*2,s:Math.random()*0.005+0.002,col:['#ffffff','#ffe8a0','#cce0ff','#ffd0ff'][Math.floor(Math.random()*4)]});
      function draw(){ctx.clearRect(0,0,W,H);stars.forEach(function(s){s.t+=s.s;var a=0.35+0.65*Math.abs(Math.sin(s.t));ctx.save();ctx.globalAlpha=a;ctx.fillStyle=s.col;ctx.shadowColor=s.col;ctx.shadowBlur=s.r*5;ctx.beginPath();ctx.arc(s.fx*W,s.fy*H,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});requestAnimationFrame(draw);}
      draw();
    })();
  </script>
