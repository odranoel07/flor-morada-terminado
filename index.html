<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="img/flowers.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@500;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  <title>Flowers</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;background:#02020f;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Raleway',sans-serif;position:relative;}

    #starfield{position:fixed;inset:0;z-index:0;}

    /* ── Mensajes motivacionales ── */
    .star-msg{position:fixed;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(0.7rem,1.8vw,1rem);color:rgba(255,255,200,0);pointer-events:none;white-space:nowrap;z-index:1;animation:floatMsg linear infinite;}
    @keyframes floatMsg{0%{transform:translateX(110vw);color:rgba(255,255,180,0);}5%{color:rgba(255,255,180,0.85);}90%{color:rgba(255,255,180,0.85);}100%{transform:translateX(-110vw);color:rgba(255,255,180,0);}}

    /* ── Gatitos flotantes ── */
    .kitty {
      position: fixed;
      z-index: 3;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      pointer-events: none;
      animation: kittyFloat linear infinite;
      filter: drop-shadow(0 0 6px rgba(180,200,255,0.6));
    }
    @keyframes kittyFloat {
      0%   { transform: translateX(0) translateY(0) rotate(0deg); opacity:0; }
      5%   { opacity: 1; }
      25%  { transform: translateX(var(--kx1)) translateY(var(--ky1)) rotate(var(--kr1)); }
      50%  { transform: translateX(var(--kx2)) translateY(var(--ky2)) rotate(var(--kr2)); }
      75%  { transform: translateX(var(--kx3)) translateY(var(--ky3)) rotate(var(--kr3)); }
      92%  { opacity: 1; }
      100% { transform: translateX(var(--kx4)) translateY(var(--ky4)) rotate(var(--kr4)); opacity:0; }
    }

    /* ── Contenido central ── */
    .content{position:relative;z-index:10;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1.6rem;}

    .greetings{display:flex;gap:0.12em;}
    .greetings span{
      font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,10vw,6rem);font-weight:600;
      color:transparent;-webkit-text-stroke:1px rgba(255,230,100,0.9);
      text-shadow:0 0 40px #ffcc0066,0 0 80px #ff880033;
      animation:letterGlow 0.6s ease forwards;opacity:0;
    }
    .greetings span:nth-child(1){animation-delay:0.1s;}.greetings span:nth-child(2){animation-delay:0.25s;}
    .greetings span:nth-child(3){animation-delay:0.4s;}.greetings span:nth-child(4){animation-delay:0.55s;}
    .greetings span:nth-child(5){animation-delay:0.7s;}.greetings span:nth-child(6){animation-delay:0.85s;}
    @keyframes letterGlow{to{opacity:1;-webkit-text-stroke-color:rgba(255,230,100,1);color:rgba(255,230,100,0.15);}}

    .description{font-family:'Raleway',sans-serif;font-size:clamp(0.8rem,2.5vw,1.05rem);font-weight:300;letter-spacing:0.35em;color:rgba(200,180,255,0.85);text-shadow:0 0 20px #9966ff66;opacity:0;animation:fadeUp 1s ease 1.4s forwards;}

    .button{opacity:0;animation:fadeUp 1s ease 2s forwards;}
    .botones{background:transparent;border:1px solid rgba(255,230,100,0.5);border-radius:40px;padding:0.65rem 2.2rem;cursor:pointer;font-family:'Raleway',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.2em;color:#ffe566;text-decoration:none;display:inline-block;transition:background 0.3s,box-shadow 0.3s,transform 0.2s;box-shadow:0 0 20px #ffcc0022;}
    .botones:hover{background:rgba(255,220,60,0.1);box-shadow:0 0 40px #ffcc0055,0 0 80px #ff880022;transform:scale(1.04);}
    .botones a{color:inherit;text-decoration:none;}

    .nebula{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
    .nebula-1{width:500px;height:500px;background:radial-gradient(circle,#3a006688 0%,transparent 70%);top:-120px;left:-100px;animation:nebDrift 18s ease-in-out infinite alternate;}
    .nebula-2{width:400px;height:400px;background:radial-gradient(circle,#00446688 0%,transparent 70%);bottom:-80px;right:-80px;animation:nebDrift 22s ease-in-out infinite alternate-reverse;}
    @keyframes nebDrift{0%{transform:translate(0,0);}100%{transform:translate(40px,30px);}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>

  <div class="content">
    <div class="greetings">
      <span>S</span><span>U</span><span>E</span><span>R</span><span>T</span>
      <span>E</span>
    </div>
    <div class="description"><span>ESTE DETALLE ES PARA TI :)</span></div>
    <div class="button">
      <button class="botones"><a href="flower.html">CLICK AQUÍ</a></button>
    </div>
  </div>

  <script>
    /* ── Estrellas ── */
    var canvas=document.getElementById('starfield'),ctx=canvas.getContext('2d'),W,H,stars=[];
    function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
    resize();window.addEventListener('resize',resize);
    for(var i=0;i<280;i++)stars.push({x:Math.random()*1,y:Math.random()*1,r:Math.random()*1.4+0.3,t:Math.random()*Math.PI*2,s:Math.random()*0.008+0.003,col:['#ffffff','#ffe8a0','#cce0ff','#ffd0ff'][Math.floor(Math.random()*4)]});
    function drawStars(){ctx.clearRect(0,0,W,H);stars.forEach(function(s){s.t+=s.s;var a=0.4+0.6*Math.abs(Math.sin(s.t));ctx.save();ctx.globalAlpha=a;ctx.fillStyle=s.col;ctx.shadowColor=s.col;ctx.shadowBlur=s.r*4;ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();ctx.restore();});requestAnimationFrame(drawStars);}
    requestAnimationFrame(drawStars);

    /* ── Mensajes motivacionales ── */
    var frases=["✨ Tú puedes con todo","🌟 Eres increíble","💫 Sigue brillando","🌙 La vida es tuya","⭐ Confía en ti","🌸 Eres la mejor","✨ Todo lo que sueñas está a tu alcance","💜 Nunca pares de crecer","🌟 Tu esfuerzo vale oro","💫 Hoy es un gran día para ti","⭐ Mereces lo mejor del universo","🌙 Cada paso cuenta"];
    var alturas=[8,15,22,30,38,50,62,72,80,88];
    frases.forEach(function(frase,i){
      var el=document.createElement('div');el.className='star-msg';el.textContent=frase;
      var dur=18+Math.random()*14,delay=i*2.8,top=alturas[i%alturas.length]+(Math.random()*5-2.5);
      el.style.top=top+'vh';el.style.animationDuration=dur+'s';el.style.animationDelay=delay+'s';
      el.style.fontSize=(0.72+Math.random()*0.35)+'rem';document.body.appendChild(el);
    });

    /* ── Gatitos flotantes ── */
    var gatitos = ['🐱','🐾','😺','😸','🐈','😻','🐱','🐾'];
    // Posiciones de partida dispersas en la pantalla
    var positions = [
      {x:8,  y:12}, {x:85, y:18}, {x:15, y:72}, {x:78, y:65},
      {x:5,  y:45}, {x:90, y:40}, {x:30, y:88}, {x:65, y:82},
      {x:48, y:5 }, {x:55, y:92}, {x:22, y:30}, {x:72, y:55}
    ];

    gatitos.forEach(function(emoji, i) {
      var el = document.createElement('div');
      el.className = 'kitty';
      el.textContent = emoji;

      // Posición inicial
      var pos = positions[i % positions.length];
      el.style.left = pos.x + 'vw';
      el.style.top  = pos.y + 'vh';

      // Movimiento aleatorio en 4 waypoints
      var rx = function(){ return (Math.random()-0.5)*18; };
      var ry = function(){ return (Math.random()-0.5)*14; };
      var rr = function(){ return (Math.random()*30-15)+'deg'; };

      el.style.setProperty('--kx1', rx()+'vw'); el.style.setProperty('--ky1', ry()+'vh'); el.style.setProperty('--kr1', rr());
      el.style.setProperty('--kx2', rx()+'vw'); el.style.setProperty('--ky2', ry()+'vh'); el.style.setProperty('--kr2', rr());
      el.style.setProperty('--kx3', rx()+'vw'); el.style.setProperty('--ky3', ry()+'vh'); el.style.setProperty('--kr3', rr());
      el.style.setProperty('--kx4', rx()+'vw'); el.style.setProperty('--ky4', ry()+'vh'); el.style.setProperty('--kr4', rr());

      var dur  = 12 + Math.random() * 10;
      var delay = i * 1.4 + Math.random() * 2;
      el.style.animationDuration  = dur + 's';
      el.style.animationDelay     = delay + 's';
      el.style.fontSize = (1.0 + Math.random() * 0.8) + 'rem';
      el.style.opacity  = '0';

      document.body.appendChild(el);
    });
  </script>
</body>
</html>
